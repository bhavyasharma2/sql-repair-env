name: sql-repair-env
version: "1.0.0"
description: >
  An RL environment where agents learn to diagnose and fix broken SQL queries.
  Three tasks of increasing difficulty: syntax errors (easy), wrong join
  semantics (medium), and silent semantic errors (hard). Graders are fully
  deterministic — results are compared against ground-truth row sets using
  DuckDB in-memory execution.

tags:
  - openenv
  - sql
  - code-repair
  - real-world
  - debugging

author: "SQL Repair Env"
license: MIT

tasks:
  - id: task_easy
    difficulty: easy
    description: "Fix syntax errors in a simple SELECT query"
    max_steps: 5

  - id: task_medium
    difficulty: medium
    description: "Fix wrong JOIN type and HAVING clause referencing wrong column"
    max_steps: 5

  - id: task_hard
    difficulty: hard
    description: "Fix a window function partitioned by wrong column (silent bug)"
    max_steps: 5

  - id: task_expert
    difficulty: expert
    description: "Fix two bugs in a recursive CTE traversing an org chart"
    max_steps: 5

observation_space:
  type: object
  fields:
    - name: task_id
      type: string
    - name: difficulty
      type: string
      enum: [easy, medium, hard]
    - name: schema_sql
      type: string
      description: "CREATE TABLE statements for the database"
    - name: sample_data
      type: string
      description: "INSERT statements with seed rows"
    - name: broken_query
      type: string
      description: "The SQL query that needs to be fixed"
    - name: objective
      type: string
      description: "Natural language description of what the query should return"
    - name: last_action
      type: string
      nullable: true
    - name: last_execution_result
      type: string
      nullable: true
    - name: last_reward
      type: number
      nullable: true
    - name: step_number
      type: integer
    - name: max_steps
      type: integer

action_space:
  type: object
  required:
    - query
  fields:
    - name: query
      type: string
      description: "The repaired SQL query the agent proposes"
    - name: explanation
      type: string
      nullable: true
      description: "Optional explanation of the fix"

reward:
  range: [0.0, 1.0]
  shaped: true
  components:
    - name: syntax_valid
      weight: 0.20
    - name: executes
      weight: 0.30
    - name: row_count_correct
      weight: 0.30
    - name: exact_match
      weight: 0.20

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  grader: POST /grader
  baseline: GET /baseline
  health: GET /health
