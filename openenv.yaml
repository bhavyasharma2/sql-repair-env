name: sql-repair-env
version: "2.0.0"
description: >
  An RL environment where agents learn to diagnose and fix broken SQL queries.
  Six tasks of increasing difficulty covering real-world SQL bug patterns:
  syntax errors, wrong JOINs, window function bugs, recursive CTEs,
  aggregation misuse, and multi-CTE date logic errors.
  Graders are fully deterministic using DuckDB in-memory execution.

tags:
  - openenv
  - sql
  - code-repair
  - debugging
  - real-world

author: "Bhavya Sharma"
license: MIT

tasks:
  - id: task_easy
    difficulty: easy
    description: "Fix syntax errors — typo FORM→FROM and missing comma"
    max_steps: 5

  - id: task_medium
    difficulty: medium
    description: "Fix wrong JOIN type (INNER→LEFT) and HAVING on wrong alias"
    max_steps: 5

  - id: task_hard
    difficulty: hard
    description: "Fix ROW_NUMBER() partitioned by wrong column (silent semantic error)"
    max_steps: 5

  - id: task_expert
    difficulty: expert
    description: "Fix recursive CTE — wrong anchor condition + wrong recursive join"
    max_steps: 5

  - id: task_adversarial
    difficulty: adversarial
    description: "Fix aggregate in WHERE clause — move SUM() to HAVING"
    max_steps: 5

  - id: task_business
    difficulty: business
    description: "Fix wrong date truncation unit in multi-CTE monthly revenue analysis"
    max_steps: 5

observation_space:
  type: object
  fields:
    - {name: task_id,               type: string}
    - {name: difficulty,            type: string}
    - {name: schema_sql,            type: string}
    - {name: sample_data,           type: string}
    - {name: broken_query,          type: string}
    - {name: objective,             type: string}
    - {name: last_query,            type: string,  nullable: true}
    - {name: last_execution_result, type: string,  nullable: true}
    - {name: last_reward,           type: number,  nullable: true}
    - {name: last_error,            type: string,  nullable: true}
    - {name: step_number,           type: integer}
    - {name: max_steps,             type: integer}
    - {name: reward_breakdown,      type: object,  nullable: true}

action_space:
  type: object
  required: [query]
  fields:
    - {name: query,       type: string}
    - {name: explanation, type: string, nullable: true}

reward:
  range: [0.001, 0.999]
  shaped: true
  components:
    - {name: syntax_valid,      weight: 0.20}
    - {name: executes,          weight: 0.30}
    - {name: row_count_correct, weight: 0.30}
    - {name: exact_match,       weight: 0.20}
